name: Build APK (Flutter CI)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - - name: Set up Flutter
  uses: subosito/flutter-action@v2
  with:
    flutter-version: '3.22.0'
    architecture: x64


    - name: Flutter pub get
      working-directory: android-wrapper/flutter
      run: flutter pub get

    - name: Build APK
      working-directory: android-wrapper/flutter
      run: flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: zx-ai-os-apk
        path: android-wrapper/flutter/build/app/outputs/flutter-apk/app-release.apk
